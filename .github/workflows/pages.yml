name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      - name: Resolve BASE_PATH for Next.js
        id: site
        shell: bash
        run: |
          set -euo pipefail
          repo='${{ github.event.repository.name }}'
          owner='${{ github.repository_owner }}'
          if [[ "${repo,,}" == "${owner,,}.github.io" ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${repo}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - run: npm ci --legacy-peer-deps

      - name: Build static export
        run: npm run build
        env:
          EXPORT: "1"
          BASE_PATH: ${{ steps.site.outputs.base_path }}

      # GitHub Pages 默认跑 Jekyll，会忽略 _next/；空文件关闭 Jekyll
      - run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
