# 使用 gh-pages 分支发布（不依赖 deploy-pages API，避免 “Creating Pages deployment 404”）。
#
# 仓库设置：Settings → Pages → Build and deployment
#   Source: Deploy from a branch
#   Branch: gh-pages  /  / (root)
#
# 若组织/仓库默认 GITHUB_TOKEN 只读：Settings → Actions → General → Workflow permissions
#   勾选 “Read and write permissions”
name: GitHub Pages

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute BASE_PATH for Next export
        id: pagesbase
        shell: bash
        run: |
          set -euo pipefail
          repo='${{ github.event.repository.name }}'
          owner='${{ github.repository_owner }}'
          rlc="${repo,,}"
          olc="${owner,,}.github.io"
          if [[ "$rlc" == "$olc" ]]; then
            echo "User/organization Pages site → base path empty"
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            echo "Project Pages site → base path /$repo"
            echo "base_path=/${repo}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - run: npm ci --legacy-peer-deps

      - run: npm run build
        env:
          EXPORT: 1
          UNOPTIMIZED: 1
          BASE_PATH: ${{ steps.pagesbase.outputs.base_path }}

      # enable_jekyll: false → 写入 .nojekyll，否则 GitHub Pages 会忽略 _next/ 等下划线目录
      - name: Push static site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          enable_jekyll: false
