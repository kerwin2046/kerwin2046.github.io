tend\"},{\"slug\":\"docker-compose\",\"title\":\"使用 Docker 和 Docker Compose 设置、容器化并测试单一 Hadoop 集群\",\"description\":\"在本地用 Docker + docker-compose 启动单节点 Hadoop 环境（NameNode、DataNode、YARN），并运行 MapReduce 示例验证可用性。\",\"date\":\"2024-05-15\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"https-make-data-transmission-secure\",\"title\":\"HTTPS：让数据传输更安全\",\"description\":\"浏览器安全主要划分为三大块内容：页面安全、系统安全和网络安全。前面我们用四篇文章介绍了页面安全和系统安全，也聊了浏览器和 Web 开发者是如何应对各种类型的攻击，本文是我们专栏的最后一张，我们就接着聊聊网络安全协议 HTTPS。 我们先从 HTTP 的明文传输的特性讲起，在上一个模块的三篇文章中我...\",\"date\":\"2024-04-22\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"sandbox-isolation-wall-between-page-and-system\",\"title\":\"沙盒：页面和系统之间的隔离墙\",\"description\":\"**从稳定视角来看，单进程架构的浏览器是不稳定的**，因为只要浏览器进程中的任意一个功能出现异常都有可能影响到整个浏览器，如页面卡死、浏览器崩溃等。不过浏览器的稳定性并不是本文讨论的重点，我们今天主要聊的是**浏览器架构是如何影响到操作系统安全的**。 浏览器本身的漏洞是单进程浏览器的一个主要问题...\",\"date\":\"2024-04-19\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"csrf-attack-dont-click-strange-links\",\"title\":\"CSRF攻击：陌生链接不要随便点\",\"description\":\"上一篇文章中我们讲到了 XSS 攻击，XSS 的攻击方式是黑客往用户的页面中注入恶意脚本，然后再通过恶意脚本将用户页面的数据上传到黑客的服务器上，最后黑客再利用这些数据进行一些恶意操作。XSS 攻击能够带来很大的破坏性，不过另外一种类型的攻击也不容忽视，它就是我们今天要聊的 CSRF 攻击。 相信...\",\"date\":\"2024-04-16\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"xss-attack-why-cookie-has-httponly\",\"title\":\"跨站脚本攻击XSS：为什么cookie中有httpOnly属性\",\"description\":\"通过上篇文章的介绍，我们知道了同源策略可以隔离各个站点之间的 DOM 交互、页面数据和网络通信，虽然严格的同源策略会带来更多的安全，但是也束缚了 Web。这就需要在安全和自由之间找到一个平衡点，所以我们默认页面中可以引用任意第三方资源，然后又引入 CSP 策略来加以限制；默认 XMLHttpRequ...\",\"date\":\"2024-04-13\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"same-origin-policy-why-xhr-cannot-cross-origin\",\"title\":\"同源策略：为什么XMLHttpRequest不能跨域请求资源\",\"description\":\"通过前面 6 个模块的介绍，我们已经大致知道浏览器是怎么工作的了，也了解这种工作方式对前端产生了什么样的影响。在这个过程中，我们还穿插介绍了一些浏览器安全相关的内容，不过都比较散，所以最后的 5 篇文章，我们就来系统地介绍下浏览器安全相关的内容。 浏览器安全可以分为三大块——Web 页面安全、浏览...\",\"date\":\"2024-04-10\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"http3-drop-tcp-tls-build-efficient-network\",\"title\":\"HTTP3：甩掉TCP、TLS包袱，构建高效网络\",\"description\":\"前面两篇文章我们分析了 HTTP / 1 和 HTTP / 2，在 HTTP / 2 出现之前，开发者需要采用很多变通的方式来解决 HTTP / 1 所存在的问题，不过 HTTP / 2 在 2018 年就开始得到了大规模的应用，HTTP / 1 中存在的一大堆缺陷都得到了解决。 HTTP / 2...\",\"date\":\"2024-04-07\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"http2-how-to-improve-network-speed\",\"title\":\"HTTP2：如何提升网络速度\",\"description\":\"上一篇文章我们聊了 HTTP / 1.1 的发展史，虽然 HTTP / 1.1 已经做了大量的优化，但是依然存在很多性能瓶颈，依然不能满足我们日益变化的新需求，所以就有了我们今天要聊的 HTTP / 2。 本文我们依然从需求的层面来谈，先分析 HTTP / 1.1 存在哪些问题，然后再来分析 HT...\",\"date\":\"2024-04-04\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"http1-performance-optimization\",\"title\":\"HTTP1：HTTP性能优化\",\"description\":\"谈及浏览器中的网络，就避不开 HTTP。我们知道 HTTP 是浏览器中最重要且使用最多的协议，是浏览器和服务器之间的通信语言，也是互联网的基石。而随着浏览器的发展，HTTP 为了能适应新的形式也在持续进化，我们认为学习 HTTP 的最佳途径就是了解其发展史，所以接下来的三篇文章中，我会从浏览器发展的...\",\"date\":\"2024-04-01\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"DevOps\"},{\"slug\":\"web-component-build-apps-like-blocks\",\"title\":\"webComponent：像搭积木一样构建web应用\",\"description\":\"什么是组件化呢？ 其实组件化并没有一个明确的定义，不过这里我们可以使用 10 个字来形容什么是组件化，那就是：对内高内聚，对外低耦合。对内各个元素彼此紧密结合、相互依赖，对外和其他组件的联系最少且接口简单。 可以说，程序员对组件化开发有着天生的需求，因为一个稍微复杂点的项目，就涉及到多人协作开发...\",\"date\":\"2024-03-26\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"pwa-what-problems-solved\",\"title\":\"PWA：解决了web应用哪些问题\",\"description\":\"PWA，全称 Progressive Web App，翻译过来就是渐进式网页应用。根据字面意思，它就是\\\"渐进式 + Web 应用\\\"。对于 Web 应用很好理解了，就是目前我们普通的 Web 页面，所以 PWA 所支持的首先是一个 Web 页面。至于\\\"渐进式\\\"，就需要从下面两个方面来理解。 - 站在...\",\"date\":\"2024-03-23\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"virtual-dom-difference-from-real-dom\",\"title\":\"虚拟DOM：虚拟DOM和实际DOM有何不同\",\"description\":\"虚拟 DOM 是最近非常火的技术，两大著名前端框架 React 和 Vue 都使用了虚拟 DOM，所以我觉得非常有必要结合浏览器的工作机制对虚拟 DOM 进行一次分析。当然了，React 和 Vue 框架本身所蕴含的知识点非常多，而且也不是我们专栏的重点，所以在这里我们还是把重心聚焦在虚拟 DOM...\",\"date\":\"2024-03-20\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"page-performance-how-to-optimize-systematically\",\"title\":\"页面性能：如何系统优化页面\",\"description\":\"在前面几篇文章中，我们分析了页面加载和 DOM 生成，讨论了 JavaScript 和 CSS 是如何影响到 DOM 生成的，还结合渲染流水线来讲解了分层和合成机制，同时在这些文章里面，我们还穿插说明了很多优化页面性能的最佳实践策略。通过这些知识点的学习，相信你已经知道渲染引擎是怎么绘制出帧的，不过...\",\"date\":\"2024-03-17\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"layering-compositing-why-css-animation-faster\",\"title\":\"分层和合成机制：为什么CSS动画比JavaScript高效\",\"description\":\"本文我们主要讲解渲染引擎的分层和合成机制，因为分层和合成机制代表了浏览器最为先进的合成技术，Chrome 团队为了做到这一点，做了大量的优化工作。了解其工作原理，有助于拓宽你的视野，而且也有助于你更加深刻地理解 CSS 动画和 JavaScript 底层工作机制。 ## 显示器是怎么显示图像的...\",\"date\":\"2024-03-14\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"rendering-pipeline-how-css-affects-white-screen\",\"title\":\"渲染流水线：CSS如何影响首次加载时的白屏时间\",\"description\":\"在上一篇文章中我们详细介绍了 DOM 的生成过程，并结合具体例子分析了 JavaScript 是如何阻塞 DOM 生成的。那本文我们就继续深入聊聊渲染流水线中的 CSS。因为 CSS 是页面中非常重要的资源，它决定了页面最终显示出来的效果，并影响着用户对整个网站的第一体验。所以，搞清楚浏览器中的 C...\",\"date\":\"2024-03-11\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"dom-tree-how-js-affects-dom-construction\",\"title\":\"DOM树：JavaScript是如何影响DOM树构建的\",\"description\":\"在上一篇文章中，我们通过开发者工具中的网络面板，介绍了网络请求过程的几种性能指标以及对页面加载的影响。 而在渲染流水线中，后面的步骤都直接或者间接地依赖于 DOM 结构，所以本文我们就继续沿着网络数据流路径来介绍 DOM 树是怎么生成的。然后再基于 DOM 树的解析流程介绍两块内容：第一个是在解析...\",\"date\":\"2024-03-08\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"page-performance-analysis-with-chrome\",\"title\":\"页面性能分析：利用chrome做web性能分析\",\"description\":\"\\\"浏览器中的页面循环系统\\\"模块我们已经介绍完了，循环系统是页面的基础，理解了循环系统能让我们从本质上更好地理解页面的工作方式，加深我们对一些前端概念的理解。 接下来我们就要进入新的模块了，也就是\\\"浏览器中的页面\\\"模块，正如专栏简介中所言，页面是浏览器的核心，浏览器中的所有功能点都是服务于页面的，而...\",\"date\":\"2024-03-05\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"async-await-sync-way-to-write-async-code\",\"title\":\"async await使用同步方式写异步代码\",\"description\":\"在上篇文章中，我们介绍了怎么使用 Promise 来实现回调操作，使用 Promise 能很好地解决回调地狱的问题，但是这种方式充满了 Promise 的 then() 方法，如果处理流程比较复杂的话，那么整段代码将充斥着 then，语义化不明显，代码不能很好地表示执行流程。 比如下面这样一个实际...\",\"date\":\"2024-03-01\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"use-promise-say-goodbye-to-callbacks\",\"title\":\"使用Promise告别回调函数\",\"description\":\"在上一篇文章中我们聊到微任务是如何工作的，并介绍了 MutationObserver 是如何利用微任务来权衡性能和效率的。今天我们就接着来聊聊任务的另外一个应用 Promise，DOM / BOM API 中新加入的 API 大多数都是建立在 Promise 上的，而且新的前端框架也使用了大量的 P...\",\"date\":\"2024-02-27\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"macro-task-micro-task-different-treatment\",\"title\":\"宏任务和微任务：不是所有的任务都是一个待遇\",\"description\":\"在前面几篇文章中，我们介绍了消息队列，并结合消息队列介绍了两种典型的 WebAPI——setTimeout 和 XMLHttpRequest，通过这两个 WebAPI 我们搞清楚了浏览器的消息循环系统是怎么工作的。不过随着浏览器的应用领域越来越广泛，消息队列中这种粗时间颗粒度的任务已经不能胜任部分领...\",\"date\":\"2024-02-24\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"webapi-how-xmlhttprequest-implemented\",\"title\":\"Webapi：XMLHttpRequest 是怎么实现的\",\"description\":\"在上一篇文章中我们介绍了 setTimeout 是如何结合渲染进程的循环系统工作的，那本篇文章我们就继续介绍另外一种类型的 WebAPI——XMLHttpRequest。 自从网页中引入了 JavaScript，我们就可以操作 DOM 树中任意一个节点，例如隐藏 / 显示节点、改变颜色、获得或改变...\",\"date\":\"2024-02-21\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"webapi-how-setTimeout-implemented\",\"title\":\"Webapi：setTimeout是怎么实现的\",\"description\":\"那在接下来的两篇文章中，我会通过 setTimeout 和 XMLHttpRequest 这两个 WebAPI 来介绍事件循环的应用。这两个 WebAPI 是两种不同类型的应用，比较典型，并且在 JavaScript 中的使用频率非常高。你可能觉得它们太简单、太基础，但有时候恰恰是基础简单的东西才最...\",\"date\":\"2024-02-18\",\"author\":\"Kerwin\",\"image\":\"$undefined\",\"tag\":\"Frontend\"},{\"slug\":\"message-queue-event-loop-how-page-alive\",\"title\":\"消息队列和事件循环：页面是怎么活起来的\",\"description\":\"前面我们讲到了每个渲染进程都有一个主线程，并且主线程非常繁忙，既要处理 DOM，又要计算样式，还要处理布局，同时还需要处理 JavaScript 任务以及各种输入事件。要让这么多不同类型的任务在主线程中有条不絮地执行，这就需要一个系统
